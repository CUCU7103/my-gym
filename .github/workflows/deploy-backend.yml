# .github/workflows/deploy-backend.yml
# main 브랜치 push 시 EC2 백엔드 자동 재배포
name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: true
    permissions: {}
    steps:
      - name: EC2에 SSH 접속해 백엔드 재배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /app

            # 최신 코드 pull
            git pull origin main

            # .env에 최신 시크릿 반영 (단따옴표 EOF: EC2 셸 확장 방지, GitHub Actions가 먼저 치환 후 전달)
            cat > /app/.env << 'EOF'
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            FRONTEND_ORIGIN=https://gymlog-wheat.vercel.app
            INVITE_CODE=${{ secrets.INVITE_CODE }}
            EOF

            # 재빌드 및 재시작
            docker compose pull db || true
            docker compose up --build -d

            # 헬스체크: 최대 30초 대기
            for i in $(seq 1 6); do
              if curl -sf http://localhost:3000/health; then
                echo "백엔드 정상 기동 확인"
                exit 0
              fi
              sleep 5
            done
            echo "헬스체크 실패" && exit 1
